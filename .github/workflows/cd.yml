name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.10'

jobs:
  # Deploy to Vercel
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --yes --force'
          working-directory: ./

      - name: Comment deployment URL
        if: github.event_name == 'push'
        run: |
          echo "🚀 Deployed to Vercel!"
          echo "Production URL: https://${{ secrets.VERCEL_PROJECT_NAME }}.vercel.app"

  # Deploy to staging (optional)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel (Staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./

      - name: Comment staging URL
        run: |
          echo "🚀 Deployed to Vercel Staging!"
          echo "Staging URL: https://${{ secrets.VERCEL_PROJECT_NAME }}-staging.vercel.app"

  # Database migration (manual trigger only)
  db-migration:
    name: Database Migration
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt asyncpg

      - name: Run database migration
        working-directory: backend
        run: |
          python -m scripts.migrate_sqlite_to_postgres \
            --migrate \
            --target "${{ secrets.DATABASE_URL }}"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
